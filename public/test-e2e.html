<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadSense E2E Test</title>
</head>

<body>
    <h1>LeadSense Test Page</h1>
    <p>This page is used for E2E testing of the LeadSense tracker.js.</p>

    <!-- Simulando um formulário para teste de captura -->
    <form id="test-form" action="/success">
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Your Name">
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="your@email.com">
        </div>
        <button type="submit">Subscribe</button>
    </form>

    <div style="height: 2000px;">
        Scroll down to test scroll events.
    </div>

    <!-- Script será injetado pelo teste -->
    <script>
        window.LeadSense = { _token: 'test-site-token' };
    </script>
    <script src="/tracker.js" data-token="test-site-token" data-privacy="anonymous"></script>
</body>

</html>

</html>
